<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1080">
    <meta name="template:media-height" content="1920">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', sans-serif;
            background: transparent;
        }

        .page-container {
            position: relative;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
        }

        .shade {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.42) 0%,
                    rgba(0, 0, 0, 0.08) 28%,
                    rgba(0, 0, 0, 0.06) 58%,
                    rgba(0, 0, 0, 0.70) 100%);
        }

        .title {
            position: absolute;
            top: 105px;
            left: 80px;
            right: 80px;
            z-index: 2;
            color: #ffffff;
            font-size: 76px;
            font-weight: 700;
            line-height: 1.18;
            text-align: center;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.55);
        }

        .title:empty {
            display: none;
        }

        .subtitle {
            position: absolute;
            left: 80px;
            right: 80px;
            bottom: 95px;
            z-index: 2;
            color: #ffffff;
            font-size: 48px;
            line-height: 1.55;
            font-weight: 600;
            text-align: center;
            text-shadow:
                0 3px 10px rgba(0, 0, 0, 0.85),
                0 0 18px rgba(0, 0, 0, 0.65);
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="shade"></div>
        <div class="title">{{title}}</div>
        <div class="subtitle">{{text}}</div>
    </div>
</body>

</html>
